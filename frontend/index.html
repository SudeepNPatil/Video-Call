<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Call App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Video Call</h1>
      <p class="subtitle">Connect instantly with anyone</p>

      <input 
        type="text" 
        id="name" 
        placeholder="Enter your name"
      />

      <input 
        type="text" 
        id="room" 
        placeholder="Enter Room ID (for joining)"
      />

      <div class="buttons">
        <button onclick="joinCall()">Join Call</button>
        <button class="create" onclick="createCall()">Create New Call</button>
      </div>
    </div>
  </div>

  <script>
    function joinCall() {
      const name = document.getElementById("name").value;
      const room = document.getElementById("room").value;

      if (!name || !room) {
        alert("Please enter name and room ID");
        return;
      }

      // redirect to your video page
      window.location.href = `video.html?name=${name}&roomId=${room}&call=join`;
    }

    function createCall() {
      const name = document.getElementById("name").value;

      if (!name) {
        alert("Please enter your name");
        return;
      }

      const roomId = Math.random().toString(36).substring(2, 6);

      alert(`Share Room Id to connect, Here is the room id: ${roomId}`);

      // redirect
      window.location.href = `video.html?name=${name}&roomId=${roomId}&call=create`;
    }
  </script>

</body>
</html>
