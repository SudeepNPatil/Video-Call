<!DOCTYPE html>
<html>
<head>
  <title>Media Test</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="env.js"></script>
</head>
<style>
    #control{
     display: flex;
     gap: 10px;

    }
    button{
        background-color: blueviolet;
        color: white;
        width: 200px;
        height: 30px;
    }
    #local{
      width: auto;
      height: auto;
      border: 10px;
      border-color: blue;
    }
    #remote{
      width: auto;
      height: auto;
      border: 10px;
      border-color: aqua;
    }
    #main{
      display: block;
    }
</style>
<body>

  <h2>My Camera</h2>
  <div id="main">
    <div id="local">
  <video id="localVideo" autoplay muted playsinline></video>
  </div>
  <div id="remote">
  <video id="remoteVideo" autoplay></video>
  </div>
  </div>

  <div id="control">
  <button id="btn1">turn off mic</button>
  <button id="btn2">turn off video</button>
  </div>

  <button style="margin-top: 20px;" id="start">Start call</button>
  <button style="margin-top: 20px;" id="end">End Call</button>

  <script src="script.js"></script>
</body>
</html>
